name: 发布Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号（如 v1.0.0）"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Cross compile
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )
          for t in "${targets[@]}"; do
            set -- $t
            GOOS=$1 GOARCH=$2
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            NAME="git-mirror-sync-${GOOS}-${GOARCH}${EXT}"
            echo "-> ${NAME}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${NAME}" ./cmd
          done
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
